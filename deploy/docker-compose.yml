name: ${COMPOSE_PROJECT_NAME:-cockpit}

x-deploy-env: &deploy-env
  - ${DEPLOY_ENV_FILE:-./env.example}

services:
  backend:
    image: ghcr.io/coachpo/cockpit-backend:latest
    env_file: *deploy-env
    command:
      - /bin/sh
      - -ec
      - |
          if [ ! -f /data/config.yaml ]; then
            cp /bootstrap/config.yaml /data/config.yaml
            sed -i '/^[[:space:]]*secret-key:/d' /data/config.yaml
          fi
          exec ./cockpit -config /data/config.yaml
    expose:
      - "8317"
    volumes:
      - ../backend/config.example.yaml:/bootstrap/config.yaml:ro
      - cockpit-config:/data
      - cockpit-auth:/home/qing/.cockpit
      - cockpit-auth:/root/.cockpit
      - nacos-cache:/tmp/nacos/cache
    restart: unless-stopped

  frontend:
    image: ghcr.io/coachpo/cockpit-frontend:latest
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  cockpit-config:
  cockpit-auth:
  nacos-cache:
