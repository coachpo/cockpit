map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream cockpit_backend {
  server backend:8080;
}

upstream cockpit_frontend {
  server frontend:80;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 25m;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Port $server_port;

  # These routes keep same-origin access working when the compose stack runs both
  # services together. The deployed frontend can also connect directly to any
  # backend origin through the runtime selector UI.
  location ^~ /api/provider/ {
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_pass http://cockpit_backend;
  }

  location ^~ /api {
    proxy_http_version 1.1;
    proxy_pass http://cockpit_backend;
  }

  location ^~ /v1/ {
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_pass http://cockpit_backend;
  }

  location / {
    proxy_http_version 1.1;
    proxy_pass http://cockpit_frontend;
  }
}
